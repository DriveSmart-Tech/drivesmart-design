<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveSmart · Docs</title>
<link rel="stylesheet" href="drivesmart.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  html { scroll-behavior: smooth; }
  .app-topbar { position: sticky; top: 0; z-index: 10; min-height: 58px; display: flex; align-items: center; gap: 16px; padding: 10px 28px; }
  .app-content { max-width: 880px; margin: 0 auto; padding: 16px 28px 120px; }

  .doc-eyebrow { display: flex; align-items: center; gap: 8px; margin: 14px 0 4px; }

  /* prose --------------------------------------------------------------- */
  .prose { font-family: var(--f-body); color: var(--text-2); font-size: 15px; line-height: 1.72; }
  .prose h1 { font-family: var(--f-display); font-size: 36px; letter-spacing: -.02em; margin: 6px 0 10px; color: var(--text-1); }
  .prose h2 { font-family: var(--f-display); font-size: 24px; margin: 40px 0 8px; padding-top: 22px; border-top: 0.5px solid var(--hairline-soft); color: var(--text-1); }
  .prose h3 { font-family: var(--f-display); font-size: 18px; margin: 26px 0 6px; color: var(--text-1); }
  .prose h4 { font-family: var(--f-mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); margin: 20px 0 6px; }
  .prose p { margin: 10px 0; }
  .prose a { color: var(--primary); text-decoration: underline; text-underline-offset: 2px; }
  .prose strong { color: var(--text-1); font-weight: 600; }
  .prose ul, .prose ol { margin: 10px 0; padding-left: 22px; }
  .prose li { margin: 5px 0; }
  .prose hr { border: none; height: 0.5px; background: var(--hairline); margin: 30px 0; }
  .prose code { font-family: var(--f-mono); font-size: .86em; background: var(--fill-1); border: 0.5px solid var(--hairline); padding: 1px 6px; border-radius: var(--r-sm); color: var(--text-1); cursor: copy; transition: background .15s; }
  .prose code:hover { background: var(--fill-2); }
  .prose code.copied { color: var(--success); border-color: var(--success-line); }
  .prose pre { background: var(--surface-low); border: 0.5px solid var(--hairline); border-radius: var(--r-lg); padding: 14px 16px; overflow-x: auto; margin: 14px 0; }
  .prose pre code { background: none; border: none; padding: 0; cursor: auto; font-size: 13px; color: var(--text-2); white-space: pre; }
  .prose blockquote { margin: 16px 0; padding: 12px 16px; border-radius: var(--r-lg);
    background: radial-gradient(120% 160% at 0% 0%, var(--primary-ghost), transparent 60%), var(--glass-bg);
    border: 0.5px solid color-mix(in srgb, var(--primary) 22%, transparent); }
  .prose blockquote p { margin: 0; color: var(--text-1); }
  .prose table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px;
    border: 0.5px solid var(--glass-border); border-radius: var(--r-lg); overflow: hidden; }
  .prose thead tr { background: var(--fill-1); }
  .prose th { text-align: left; padding: 11px 14px; font-family: var(--f-mono); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); border-bottom: 0.5px solid var(--hairline); }
  .prose td { padding: 11px 14px; border-bottom: 0.5px solid var(--hairline-soft); color: var(--text-2); vertical-align: middle; }
  .prose tbody tr:last-child td { border-bottom: none; }
  .hex-chip { display: inline-block; width: 14px; height: 14px; border-radius: 4px; border: 0.5px solid var(--hairline); margin-right: 7px; vertical-align: -2px; }
  .doc-error { padding: 40px; text-align: center; color: var(--text-3); }
</style>
</head>
<body class="bg-grid-pattern">
<div class="aurora-bg"></div>

<header class="app-topbar glass-nav">
  <nav class="flex items-center gap-4">
    <a class="topnav-link" href="index.html">Gallery</a>
    <a class="topnav-link" id="navBrand" href="docs.html?doc=brand">Brand&nbsp;guide</a>
    <a class="topnav-link" id="navDesign" href="docs.html?doc=design">Spec</a>
  </nav>
  <div class="ml-auto flex items-center gap-3">
    <a class="btn btn--soft" id="rawLink" href="#" target="_blank" rel="noopener"><span class="material-symbols-outlined">description</span> Raw .md</a>
    <button class="btn btn--icon" id="themeToggle" title="Toggle theme"><span class="material-symbols-outlined">dark_mode</span></button>
  </div>
</header>

<main class="app-content">
  <div class="doc-eyebrow"><span class="material-symbols-outlined text-primary" id="docIcon">palette</span><span class="eyebrow" id="docKind">Brand guide</span></div>
  <article class="prose" id="prose"><p class="text-3">Loading…</p></article>
</main>

<script>
(function () {
  var docEl = document.documentElement;
  function applyTheme(t) {
    if (t === 'light') docEl.setAttribute('data-theme', 'light'); else docEl.removeAttribute('data-theme');
    var ic = document.querySelector('#themeToggle .material-symbols-outlined'); if (ic) ic.textContent = (t === 'light') ? 'light_mode' : 'dark_mode';
    try { localStorage.setItem('ds-theme', t); } catch (e) {}
  }
  document.getElementById('themeToggle').addEventListener('click', function () { applyTheme(docEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); });
  try { applyTheme(localStorage.getItem('ds-theme') || 'dark'); } catch (e) {}

  var DOCS = {
    brand:  { file: 'BRAND.md',  kind: 'Brand guide', icon: 'palette',     title: 'Brand guide' },
    design: { file: 'DESIGN.md', kind: 'Spec',        icon: 'description', title: 'Spec' }
  };
  var which = (new URLSearchParams(location.search).get('doc') || 'brand').toLowerCase();
  var d = DOCS[which] || DOCS.brand;

  document.title = 'DriveSmart · ' + d.title;
  document.getElementById('docKind').textContent = d.kind;
  document.getElementById('docIcon').textContent = d.icon;
  document.getElementById('rawLink').href = d.file;
  document.getElementById(which === 'design' ? 'navDesign' : 'navBrand').classList.add('active');

  var prose = document.getElementById('prose');
  fetch(d.file).then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(function (md) {
      prose.innerHTML = marked.parse(md);
      // hex swatches: prepend a colour chip to any #RRGGBB code
      prose.querySelectorAll('code').forEach(function (c) {
        var t = c.textContent.trim();
        if (/^#?[0-9A-Fa-f]{6}$/.test(t)) {
          var hex = t[0] === '#' ? t : '#' + t;
          var chip = document.createElement('span'); chip.className = 'hex-chip'; chip.style.background = hex;
          c.insertBefore(chip, c.firstChild);
        }
        // click any inline code to copy its text
        c.addEventListener('click', function () {
          var txt = c.textContent.trim();
          var done = function () { c.classList.add('copied'); setTimeout(function () { c.classList.remove('copied'); }, 1100); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done);
          else done();
        });
      });
    })
    .catch(function () {
      prose.innerHTML = '<div class="doc-error">Couldn’t load <code>' + d.file + '</code>. View this page over http (GitHub Pages or a local server), not from a <code>file://</code> path.</div>';
    });
})();
</script>
</body>
</html>
